<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Navbar + Flexbox Playground</title>
  <style>
    /* Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, Arial, Helvetica, sans-serif; background:#f3f4f6; color:#111827; }

    /* Navbar */
    .navbar { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; background:#0f172a; color:#fff; }
    .brand { display:flex; align-items:center; gap:12px; }
    .logo { width:36px; height:36px; display:inline-block; background:linear-gradient(135deg,#06b6d4,#3b82f6); border-radius:6px; }
    .brand-name { font-weight:700; letter-spacing:0.4px; }

    .nav-links { display:flex; gap:22px; list-style:none; align-items:center; }
    .nav-links a { color:#e6eef8; text-decoration:none; font-size:15px; padding:6px 8px; border-radius:4px; }
    .nav-links a:hover { color:#7dd3fc; background:rgba(255,255,255,0.02); }

    .login-btn { background:#7dd3fc; color:#082038; padding:8px 14px; border-radius:6px; font-weight:600; text-decoration:none; }
    .login-btn:hover { background:#38bdf8; color:#06202a; }

    /* Responsive: stack links on small screens */
    @media (max-width:720px) {
      .navbar { flex-direction:column; gap:12px; align-items:flex-start; padding:12px; }
      .nav-links { flex-wrap:wrap; gap:10px; }
    }

    /* Page content */
    .container { max-width:980px; margin:28px auto; padding:0 18px; }
    .hero { text-align:center; margin:26px 0 18px; }
    .hero h1 { font-size:24px; color:#0b1220; margin-bottom:8px; }
    .hero p { color:#475569; }

    /* Playground */
    .playground { background:#fff; border-radius:10px; padding:18px; box-shadow:0 6px 18px rgba(15,23,42,0.06); }
    .controls { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
    .control { display:flex; flex-direction:column; font-size:13px; color:#0f172a; }
    .control label { margin-bottom:6px; font-weight:600; }
    .control select, .control input[type=range] { padding:8px 10px; border-radius:6px; border:1px solid #e6eef8; background:#fbfdff; }

    .play-area { background:#0b1220; border-radius:8px; padding:16px; min-height:200px; display:flex; align-items:flex-start; }
    .flex-box { display:flex; gap:12px; width:100%; min-height:160px; padding:10px; border-radius:6px; }
    .box { width:64px; height:64px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:700; color:#06202a; }
    .box:nth-child(1){ background:#60a5fa }
    .box:nth-child(2){ background:#34d399 }
    .box:nth-child(3){ background:#fbbf24 }
    .box:nth-child(4){ background:#f472b6 }

    .code-output { margin-top:12px; background:#071023; color:#7dd3fc; padding:12px; border-radius:6px; font-family:monospace; font-size:13px; white-space:pre; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="brand">
      <span class="logo" aria-hidden="true"></span>
      <div class="brand-name">MyCompany</div>
    </div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#" class="login-btn">Login</a></li>
    </ul>
  </nav>

  <main class="container">
    <section class="hero">
      <h1>Flexbox Playground</h1>
      <p>Adjust controls below to experiment with `justify-content`, `align-items`, `gap`, and `flex-direction`.</p>
    </section>

    <section class="playground">
      <div class="controls">
        <div class="control">
          <label for="justifyContent">justify-content</label>
          <select id="justifyContent">
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="space-between">space-between</option>
            <option value="space-around">space-around</option>
            <option value="space-evenly">space-evenly</option>
          </select>
        </div>

        <div class="control">
          <label for="alignItems">align-items</label>
          <select id="alignItems">
            <option value="stretch">stretch</option>
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="baseline">baseline</option>
          </select>
        </div>

        <div class="control">
          <label for="flexDirection">flex-direction</label>
          <select id="flexDirection">
            <option value="row">row</option>
            <option value="row-reverse">row-reverse</option>
            <option value="column">column</option>
            <option value="column-reverse">column-reverse</option>
          </select>
        </div>

        <div class="control">
          <label for="gap">gap (<span id="gapValue">12</span>px)</label>
          <input id="gap" type="range" min="0" max="80" value="12">
        </div>
      </div>

      <div class="play-area">
        <div id="flexBox" class="flex-box">
          <div class="box">1</div>
          <div class="box">2</div>
          <div class="box">3</div>
          <div class="box">4</div>
        </div>
      </div>

      <div id="codeOutput" class="code-output"></div>
    </section>
  </main>

  <script>
    // Controls
    const justifyEl = document.getElementById('justifyContent');
    const alignEl = document.getElementById('alignItems');
    const dirEl = document.getElementById('flexDirection');
    const gapEl = document.getElementById('gap');
    const gapValueEl = document.getElementById('gapValue');
    const flexBox = document.getElementById('flexBox');
    const codeOutput = document.getElementById('codeOutput');

    function updatePlayground() {
      const justify = justifyEl.value;
      const align = alignEl.value;
      const direction = dirEl.value;
      const gap = gapEl.value + 'px';

      gapValueEl.textContent = gapEl.value;
      flexBox.style.justifyContent = justify;
      flexBox.style.alignItems = align;
      flexBox.style.flexDirection = direction;
      flexBox.style.gap = gap;

      codeOutput.textContent = `display: flex;\njustify-content: ${justify};\nalign-items: ${align};\nflex-direction: ${direction};\ngap: ${gap};`;
    }

    // Wire events
    [justifyEl, alignEl, dirEl].forEach(el => el.addEventListener('change', updatePlayground));
    gapEl.addEventListener('input', updatePlayground);

    // Initialize
    updatePlayground();
  </script>

</body>
</html>
